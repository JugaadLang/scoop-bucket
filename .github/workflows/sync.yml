name: Sync Root Manifest to Bucket

on:
  push:
    paths:
      - 'jugaadlang.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Manifest
        run: |
          mkdir -p bucket
          cp jugaadlang.json bucket/jugaadlang.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/jugaadlang.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync: root manifest to bucket/jugaadlang.json" && git push)
